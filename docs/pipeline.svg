<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 200" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1120" height="200" rx="10" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f4f6f8;stroke:#3b5bdb;stroke-width:1.5;}
    .io{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;}
    .t{fill:#1f2933;font-size:15px;font-weight:600;}
    .s{fill:#52606d;font-size:12px;}
    .a{stroke:#94a3b8;stroke-width:2;}
  </style>

  <rect class="io" x="16"  y="58" width="170" height="84" rx="8"/>
  <text class="t" x="101" y="92"  text-anchor="middle">train.csv</text>
  <text class="t" x="101" y="112" text-anchor="middle">problems.jsonl</text>
  <text class="s" x="101" y="131" text-anchor="middle">inputs</text>

  <rect class="box" x="222" y="58" width="170" height="84" rx="8"/>
  <text class="t" x="307" y="94"  text-anchor="middle">reasoning.py</text>
  <text class="s" x="307" y="116" text-anchor="middle">solvers → CoT traces</text>

  <rect class="box" x="428" y="58" width="170" height="84" rx="8"/>
  <text class="t" x="513" y="94"  text-anchor="middle">augmentation.py</text>
  <text class="s" x="513" y="116" text-anchor="middle">augmenters expand</text>

  <rect class="box" x="634" y="58" width="170" height="84" rx="8"/>
  <text class="t" x="719" y="94"  text-anchor="middle">corpus.py</text>
  <text class="s" x="719" y="116" text-anchor="middle">tokenize + loss mask</text>

  <rect class="io" x="840" y="58" width="170" height="84" rx="8"/>
  <text class="t" x="925" y="92"  text-anchor="middle">tokens/ +</text>
  <text class="t" x="925" y="112" text-anchor="middle">index.jsonl</text>
  <text class="s" x="925" y="131" text-anchor="middle">→ trainer</text>

  <line class="a" x1="188" y1="100" x2="220" y2="100" marker-end="url(#arr)"/>
  <line class="a" x1="394" y1="100" x2="426" y2="100" marker-end="url(#arr)"/>
  <line class="a" x1="600" y1="100" x2="632" y2="100" marker-end="url(#arr)"/>
  <line class="a" x1="806" y1="100" x2="838" y2="100" marker-end="url(#arr)"/>

  <text class="s" x="16" y="30" font-size="13" font-weight="700" fill="#1f2933">Data pipeline</text>
</svg>
